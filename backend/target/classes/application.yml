spring:
  application:
    name: class-management-system

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://111.228.5.192:5432/resumeDemo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:p0@wls12ss}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      connection-init-sql: SELECT 1

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# LangChain4j 千问配置
langchain:
  qwen:
    api-key: ${QWEN_API_KEY:sk-21c16f7ec89f401d93a7738d44d159b8}
    model-name: qwen-turbo
    embedding-model-name: text-embedding-v3
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

  # pgvector RAG 配置
  pgvector:
    host: ${DB_HOST:111.228.5.192}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:resumeDemo}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:p0@wls12ss}
    table: langchain4j_embeddings   # LangChain4j 内置向量表（与业务向量表分开）
    dimension: 1024
